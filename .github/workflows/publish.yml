name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm's --provenance flag: it uses this token to attest (via
      # Sigstore) that the published package was built from this exact commit, in
      # this exact CI run, from this exact repo - not hand-built and uploaded
      # locally. Consumers can verify this via `npm audit signatures` or on the
      # npm registry's package page.
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build library
        run: npm run build:only

      - name: Bundle-size check
        run: npm run size-check

      - name: Build type declarations
        run: npm run build:types

      - name: Verify package version matches the tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
