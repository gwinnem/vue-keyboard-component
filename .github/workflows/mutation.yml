name: Mutation Testing

on:
  workflow_dispatch: {}
  schedule:
    # Weekly, not on every PR/push - a full mutation run is far slower than the
    # rest of the CI suite combined, and doesn't need to gate merges the way
    # typecheck/lint/unit-test coverage does.
    - cron: '0 6 * * 1'

jobs:
  mutation-test:
    name: Stryker mutation testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation
          retention-days: 90
